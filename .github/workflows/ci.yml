# Continuous integration — runs on every PR and every push to main.
# Catches regressions before they reach the deploy.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-flight runs when a new commit is pushed to the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (tsc + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      # Prisma client needs to be generated before tsc can resolve @prisma/client types
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          # Prisma generate needs SOME value here; a placeholder works (no live connection used)
          DATABASE_URL: postgresql://placeholder@localhost:5432/placeholder

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Vite build
        run: npm run build
